name: Validate Service PR

on:
  pull_request:
    paths: ['services/**']

permissions:
  pull-requests: write
  contents: write

jobs:
  validate:
    name: Validate CA Registry Data
    runs-on: ubuntu-latest
    # Only run when services/ data files are changed, not for code-only PRs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Get changed service files
        id: changes
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- services/)
          if [ -z "$FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No service file changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "Changed files:"
            echo "$FILES"
          fi

      - name: Run validation
        if: steps.changes.outputs.has_changes == 'true'
        id: validate
        run: |
          python scripts/validate.py \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --pr-title "${{ github.event.pull_request.title }}" \
            --base-ref "origin/${{ github.base_ref }}" \
            --output report.md
        continue-on-error: true

      - name: Post validation report
        if: steps.changes.outputs.has_changes == 'true' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('report.md')) {
              console.log('No report generated');
              return;
            }
            const report = fs.readFileSync('report.md', 'utf8');

            // Find existing bot comment to update (avoid duplicates)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('CA Registry Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report,
              });
            }

      - name: Check validation result
        if: steps.changes.outputs.has_changes == 'true' && always()
        run: |
          if [[ -f report.md ]] && grep -q "❌" report.md; then
            echo "::error::Validation failed — see PR comment for details"
            exit 1
          fi

  auto-merge:
    name: Auto-merge Service PR
    needs: validate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Auto-merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Double-check: only auto-merge if PR title matches service operations
            const serviceOps = /^\[(Register|AddCA|RemoveCA|Update)\]/;
            if (!serviceOps.test(pr.title)) {
              console.log(`Skipping auto-merge: PR title "${pr.title}" is not a service operation`);
              return;
            }

            console.log(`Validation passed. Auto-merging PR #${pr.number}...`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log('PR merged successfully');
            } catch (error) {
              console.log(`Auto-merge skipped: ${error.message}`);
            }
